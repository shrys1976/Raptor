<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RaptorGraph</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="workspace">
    <header class="top-strip">
      <div class="top-strip__title">RaptorGraph</div>
      <div class="top-strip__stats">
        <label class="graph-picker">
          <span>graph</span>
          <select id="graph-picker"></select>
        </label>
        <span class="stat-pill">name <strong id="meta-name">-</strong></span>
        <span class="stat-pill">nodes <strong id="meta-nodes">-</strong></span>
        <span class="stat-pill">edges <strong id="meta-edges">-</strong></span>
        <span class="stat-pill stat-pill--status" id="status-banner">Loading graph...</span>
      </div>
    </header>

    <div id="graph-stage" class="graph-stage">
      <svg id="edge-layer"></svg>
      <div id="node-layer"></div>
    </div>
  </main>

  <script src="/static/graph.js"></script>
</body>
</html>
